<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; font-family: system-ui; padding: 10px; margin: 0; }
    #note-list { border-bottom: 1px solid #ccc; margin-bottom: 10px; padding-bottom: 10px; max-height: 100px; overflow-y: auto; }
    .note-item { cursor: pointer; padding: 5px; border: 1px solid #eee; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: center; }
    .note-item.active { background-color: #e0e0e0; }
    .delete-note { color: #999; cursor: pointer; padding: 0 5px; border: none; background: none; font-size: 14px; }
    .delete-note:hover { color: #f00; }
    #note-content { width: 100%; height: 200px; box-sizing: border-box; }
    .controls { margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="controls">
      <button id="new-note" data-i18n="btnNew">New Note</button>
    </div>
    <div id="note-list"></div>
    <textarea id="note-content" data-i18n-placeholder="placeholder" placeholder="Select or create a note..."></textarea>
  </div>
  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
