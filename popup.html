<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-muted: #f1f4f8;
      --border: #d8dee8;
      --border-strong: #9aa8b8;
      --text: #17202a;
      --muted: #4b5563;
      --primary: #1f5fbf;
      --primary-strong: #17478f;
      --danger: #b42318;
      --focus: #0b57d0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 340px;
      margin: 0;
      padding: 14px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    #app {
      display: grid;
      gap: 12px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    button {
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    .note-select:focus-visible,
    .note-item:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
      box-shadow: 0 0 0 4px rgba(11, 87, 208, 0.18);
    }

    #new-note {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
      font-weight: 650;
    }

    #new-note:hover {
      background: var(--primary-strong);
    }

    #upgrade-btn {
      padding: 0 12px;
    }

    #premium-badge {
      border: 1px solid #b8860b;
      border-radius: 999px;
      padding: 3px 8px;
      background: #fff7d6;
      color: #6f4d00;
      font-size: 12px;
      font-weight: 700;
    }

    #search-input {
      width: 100%;
      min-height: 44px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
    }

    #note-list {
      display: grid;
      gap: 6px;
      max-height: 144px;
      overflow-y: auto;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
    }

    .note-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 44px;
      padding: 0;
      border: 1px solid transparent;
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }

    .note-item:hover {
      background: var(--surface-muted);
    }

    .note-item.active {
      border-color: var(--primary);
      background: #eaf2ff;
    }

    .note-select {
      display: flex;
      align-items: center;
      flex: 1 1 auto;
      min-width: 0;
      min-height: 44px;
      padding: 8px 8px 8px 10px;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .note-title {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .delete-note {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 44px;
      width: 44px;
      min-height: 44px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
    }

    .delete-note:hover {
      color: var(--danger);
      background: #fff0ee;
    }

    .empty-state {
      padding: 14px 10px;
      border: 1px dashed var(--border-strong);
      border-radius: 8px;
      background: var(--surface-muted);
      color: var(--muted);
      text-align: center;
    }

    #note-content {
      width: 100%;
      height: 220px;
      padding: 10px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="controls">
      <button id="new-note" type="button" data-i18n="btnNew">New Note</button>
      <span id="premium-badge" hidden data-i18n="premiumBadge">Premium</span>
      <button id="upgrade-btn" type="button" hidden data-i18n="btnUpgrade">Upgrade</button>
    </div>
    <div id="search-container" hidden>
      <label class="visually-hidden" for="search-input" data-i18n="searchLabel">Search notes</label>
      <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Search..." autocomplete="off">
    </div>
    <div id="note-list" role="list" data-i18n-aria-label="noteListLabel" aria-label="Notes"></div>
    <label class="visually-hidden" for="note-content" data-i18n="noteContentLabel">Note content</label>
    <textarea id="note-content" data-i18n-placeholder="placeholder" placeholder="Select or create a note..."></textarea>
    <div class="status-row" role="status" aria-live="polite">
      <span id="app-status" data-i18n="statusLoading">Loading notes...</span>
    </div>
  </div>
  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
