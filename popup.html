<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; font-family: system-ui; padding: 10px; margin: 0; }
    #note-list { border-bottom: 1px solid #ccc; margin-bottom: 10px; padding-bottom: 10px; max-height: 100px; overflow-y: auto; }
    .note-item { cursor: pointer; padding: 5px; border: 1px solid #eee; margin-bottom: 2px; }
    .note-item.active { background-color: #e0e0e0; }
    #note-content { width: 100%; height: 200px; box-sizing: border-box; }
    .controls { margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="controls">
      <button id="new-note">New Note</button>
    </div>
    <div id="note-list"></div>
    <textarea id="note-content" placeholder="Select or create a note..."></textarea>
  </div>
  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
