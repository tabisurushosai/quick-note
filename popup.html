<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-muted: #f1f4f8;
      --border: #d8dee8;
      --border-strong: #9aa8b8;
      --text: #17202a;
      --muted: #4b5563;
      --primary: #1f5fbf;
      --primary-strong: #17478f;
      --primary-bg: #eaf2ff;
      --success: #0f6b3c;
      --success-bg: #e9f7ef;
      --danger: #b42318;
      --danger-bg: #fff0ee;
      --focus: #0b57d0;
      --control-height: 44px;
      --shadow-subtle: 0 8px 24px rgba(23, 32, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 360px;
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    #app {
      display: grid;
      gap: 14px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    button {
      min-width: var(--control-height);
      min-height: var(--control-height);
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    .note-select:focus-visible,
    .note-item:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
      box-shadow: 0 0 0 4px rgba(11, 87, 208, 0.18);
    }

    #new-note {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
      font-weight: 650;
    }

    #new-note:hover {
      background: var(--primary-strong);
    }

    #upgrade-btn {
      padding: 0 12px;
    }

    #premium-badge {
      border: 1px solid #b8860b;
      border-radius: 999px;
      padding: 3px 8px;
      background: #fff7d6;
      color: #6f4d00;
      font-size: 12px;
      font-weight: 700;
    }

    #search-input {
      width: 100%;
      min-height: var(--control-height);
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
    }

    #search-input::placeholder,
    #note-content::placeholder {
      color: #5f6b7a;
      opacity: 1;
    }

    #note-list {
      display: grid;
      gap: 8px;
      max-height: 156px;
      overflow-y: auto;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow-subtle);
    }

    .note-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: var(--control-height);
      padding: 0;
      border: 1px solid transparent;
      border-radius: 10px;
      background: var(--surface);
      overflow: hidden;
    }

    .note-item:hover {
      background: var(--surface-muted);
    }

    .note-item.active {
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    .note-select {
      display: flex;
      align-items: center;
      flex: 1 1 auto;
      min-width: 0;
      min-height: var(--control-height);
      padding: 9px 10px 9px 12px;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .note-title {
      min-width: 0;
      overflow: hidden;
      color: var(--text);
      font-weight: 600;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .delete-note {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 var(--control-height);
      width: var(--control-height);
      min-height: var(--control-height);
      padding: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
    }

    .delete-note:hover {
      color: var(--danger);
      background: var(--danger-bg);
    }

    .empty-state {
      display: grid;
      gap: 6px;
      padding: 18px 14px;
      border: 1px dashed var(--border-strong);
      border-radius: 12px;
      background: var(--surface-muted);
      color: var(--muted);
      text-align: center;
    }

    .empty-state-title,
    .empty-state-description {
      margin: 0;
    }

    .empty-state-title {
      color: var(--text);
      font-weight: 700;
    }

    .empty-state-description {
      line-height: 1.5;
    }

    .empty-state-action {
      margin-top: 6px;
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 650;
    }

    .onboarding-guide {
      margin: 0;
      padding: 10px 12px;
      border: 1px solid #c9daf8;
      border-radius: 10px;
      background: #eef5ff;
      color: var(--primary-strong);
      font-size: 13px;
    }

    #note-content {
      width: 100%;
      height: 232px;
      padding: 12px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      box-shadow: var(--shadow-subtle);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 30px;
      color: var(--muted);
      font-size: 12px;
    }

    #app-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-weight: 650;
    }

    #app-status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
    }

    #app-status[data-state="loading"],
    #app-status[data-state="saving"] {
      border-color: #c9daf8;
      background: #eef5ff;
      color: var(--primary-strong);
    }

    #app-status[data-state="saved"] {
      border-color: #b8dec5;
      background: var(--success-bg);
      color: var(--success);
    }

    #app-status[data-state="error"] {
      border-color: #f1b8b2;
      background: var(--danger-bg);
      color: var(--danger);
    }
  </style>
</head>
<body>
  <main id="app" aria-labelledby="app-title">
    <h1 id="app-title" class="visually-hidden" data-i18n="extName">さっとメモ</h1>
    <div class="controls">
      <button id="new-note" type="button" data-i18n="btnNew">メモを追加</button>
      <span id="premium-badge" hidden data-i18n="premiumBadge">プレミアム</span>
      <button id="upgrade-btn" type="button" hidden data-i18n="btnUpgrade">プレミアムにアップグレード</button>
    </div>
    <p id="onboarding-guide" class="onboarding-guide" hidden data-i18n="onboardingGuide">まずは下のメモ欄に入力してください。内容はこの端末に自動で保存されます。</p>
    <div id="search-container" hidden>
      <label class="visually-hidden" for="search-input" data-i18n="searchLabel">メモを検索</label>
      <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="メモを検索" autocomplete="off" aria-controls="note-list">
    </div>
    <p id="note-list-help" class="visually-hidden" data-i18n="noteListHelp">メモ一覧では、上下矢印キーで前後のメモへ移動できます。Homeキーで先頭、Endキーで末尾へ移動できます。</p>
    <div id="note-list" role="list" data-i18n-aria-label="noteListLabel" aria-label="メモ一覧" aria-describedby="note-list-help"></div>
    <label class="visually-hidden" for="note-content" data-i18n="noteContentLabel">メモ本文</label>
    <textarea id="note-content" data-i18n-placeholder="placeholder" placeholder="メモを選択するか、新しいメモを作成してください。" aria-describedby="app-status"></textarea>
    <div class="status-row" role="status" aria-live="polite">
      <span id="app-status" data-state="loading" data-i18n="statusLoading">メモを読み込んでいます...</span>
    </div>
  </main>
  <script type="module" src="/src/popup.ts"></script>
</body>
</html>
